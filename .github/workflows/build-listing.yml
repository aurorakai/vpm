name: Build Repo Listing

on:
  workflow_dispatch:
  push:
    branches: main
    paths:
      - source.json
      - .github/workflows/build-listing.yml
      - Website/**
  # Package repos can fire repository_dispatch on release to trigger an
  # immediate rebuild. Each package uses its own event type so the logs
  # stay informative about which package caused the run.
  repository_dispatch:
    types:
      - sps-tools-released

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  
# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true
  
env:
  listPublishDirectory: Website
  pathToCi: ci

jobs:
  
  build-listing:
    name: build-listing
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v4 # check out this repo
      - uses: actions/checkout@v4 # check out automation repo
        with:
          repository: vrchat-community/package-list-action
          path: ${{env.pathToCi}}
          clean: false # otherwise the local repo will no longer be checked out
          
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{env.pathToCi}}/.nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj') }}
          
      - name: Build Package Version Listing
        run: ${{env.pathToCi}}/build.cmd BuildMultiPackageListing --root ${{env.pathToCi}} --list-publish-directory $GITHUB_WORKSPACE/${{env.listPublishDirectory}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject package types into listing
        # vrchat-community/package-list-action doesn't propagate the 'type'
        # field from each package's package.json into the generated listing, so
        # VCC's Avatar/World/Tool filter buckets everything under "Any". Patch
        # the built index.json to restore the intended type per package.
        shell: bash
        run: |
          FILE="${{env.listPublishDirectory}}/index.json"
          if [ ! -f "$FILE" ]; then
            echo "::error::$FILE not found - listing build may have failed"
            exit 1
          fi
          # Map of package name -> type. Extend here as new packages are added.
          jq '
            (.packages["com.aurorakai.sps-tools"].versions // {}) |=
              with_entries(.value.type = "avatar")
          ' "$FILE" > "$FILE.tmp" && mv "$FILE.tmp" "$FILE"
          echo "Patched types:"
          jq -r '
            .packages | to_entries[] |
              "  " + .key + ":\n" +
              (.value.versions | to_entries | map("    " + .key + " -> type=" + (.value.type // "(none)")) | join("\n"))
          ' "$FILE"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{env.listPublishDirectory}}
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4